    <style>
      body {
        margin: 0;
        background-color: #FAF9F6;
        color: #2D1A4A;
        font-family: 'Outfit', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root:empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #FAF9F6;
      }
      /* Simple smooth bounce animation for fallback/loading state */
      .loading-brand {
        font-weight: 800; 
        color: #5E3BEE; 
        letter-spacing: -0.05em; 
        font-size: 1.75rem;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(0.98); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Instrumate Africa",
        "url": "https://instrumate.jhubafrica.com/",
        "logo": "https://instrumate.jhubafrica.com/logo.svg",
        "description": "AI-powered Kenyan Sign Language (KSL) tools for inclusive education and multi-sensory learners.",
        "sameAs": [
          "https://linkedin.com/company/instrumate-africa"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root">
      <main>
